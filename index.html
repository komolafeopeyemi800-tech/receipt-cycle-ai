    <meta name="googlebot" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />

    <!-- Favicons (cache-busted — forces Google & browsers to refetch) -->

    <link rel="icon" href="/favicon-32.png?v=3" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-16.png?v=3" type="image/png" sizes="16x16" />

    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Receipt Cycle" />
    <meta property="og:title" content="Receipt Cycle — AI Receipt Scanner & Expense Tracker" />

    <meta property="og:image:alt" content="Receipt Cycle — Scan once. See your money clearly." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@receiptcycle" />
    <meta name="twitter:creator" content="@receiptcycle" />
    <meta name="twitter:title" content="Receipt Cycle — AI Receipt Scanner & Expense Tracker" />

    <meta name="twitter:image:alt" content="Receipt Cycle — Scan once. See your money clearly." />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Receipt Cycle",
        "url": "https://receiptcycle.com",
        "logo": "https://receiptcycle.com/icon-512.png?v=3",
        "email": "support@receiptcycle.com",
        "sameAs": [
          "https://x.com/receiptcycle",
          "https://www.instagram.com/receiptcycle"
        ]
      }
    </script>

    <!-- JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Receipt Cycle",
        "url": "https://receiptcycle.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://receiptcycle.com/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Receipt Cycle",
        "operatingSystem": "iOS, Android, Web",
        "applicationCategory": "FinanceApplication",
        "description": "AI-powered receipt scanner and expense tracker. Capture purchases, catch money leaks, and keep audit-ready records for tax time.",
        "image": "https://receiptcycle.com/og-image.png?v=3",
        "url": "https://receiptcycle.com",
        "offers": [
          { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free" },
          { "@type": "Offer", "price": "9.99", "priceCurrency": "USD", "name": "Pro Monthly" },
          { "@type": "Offer", "price": "89.99", "priceCurrency": "USD", "name": "Pro Yearly" }
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "124"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Receipt Cycle"
        }
      }
    </script>
  </head>

        <p style="margin:12px 0 0 0">

          <a href="/pricing">Pricing</a> · <a href="/faq">FAQ</a> · <a href="/contact">Contact</a>
        </p>

    <script type="module" src="/src/main.tsx"></script>

</html>
