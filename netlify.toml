# Netlify — Receipt Cycle web (Vite SPA at repo root)
# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# IMPORTANT: A custom "Build command" in the Netlify UI overrides this file.
# If deploys use `bun run build` (or anything other than below), clear it under
# Site configuration → Build & deploy → Build settings, or set it to: npm run build

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Client-side routing: send all non-file paths to the app shell
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
