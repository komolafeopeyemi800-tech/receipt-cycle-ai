<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="ts">
  <title id="ts">Scan a paper receipt with guided camera capture</title>
  <rect width="900" height="675" fill="#1e293b"/>
  <rect x="200" y="40" width="500" height="600" rx="32" fill="#0f172a" stroke="#334155" stroke-width="3"/>
  <rect x="220" y="72" width="460" height="536" rx="20" fill="#1e293b"/>
  <!-- Viewfinder -->
  <rect x="260" y="140" width="380" height="420" rx="12" fill="#0c4a3e" opacity="0.6"/>
  <rect x="300" y="200" width="300" height="360" rx="8" fill="#fff" stroke="#facc15" stroke-width="4" stroke-dasharray="12 8"/>
  <!-- Paper receipt in frame -->
  <g transform="translate(320, 240) rotate(-3)">
    <rect width="260" height="340" rx="6" fill="#fafaf9" stroke="#d6d3d1"/>
    <text x="130" y="48" text-anchor="middle" fill="#78716c" font-family="system-ui,sans-serif" font-size="11" font-weight="700">STORE RECEIPT</text>
    <rect x="32" y="70" width="196" height="4" rx="1" fill="#d6d3d1"/>
    <rect x="32" y="84" width="160" height="4" rx="1" fill="#d6d3d1"/>
    <rect x="32" y="98" width="180" height="4" rx="1" fill="#d6d3d1"/>
    <text x="130" y="200" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="22" font-weight="800">TOTAL $42.18</text>
    <rect x="32" y="260" width="196" height="4" rx="1" fill="#d6d3d1"/>
  </g>
  <text x="450" y="620" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Align receipt in frame</text>
  <circle cx="450" cy="610" r="6" fill="#22c55e"/>
</svg>
